<!-- APENAS 1 SCRIPT PARA TROCAR A IMAGEM CORRETAMENTE -->
<script>
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('.galeria-vip').forEach(galeria => {
      const imagemPrincipal = galeria.querySelector('.imagem-destaque');
      const miniaturas = galeria.querySelectorAll('.imagens-pequenas img');

      miniaturas.forEach(mini => {
        mini.addEventListener('click', () => {
          imagemPrincipal.src = mini.src;
          imagemPrincipal.alt = mini.alt;
        });
      });
    });
  });
</script>

<script>
  document.addEventListener('DOMContentLoaded', function () {
  document.querySelectorAll('.galeria-vip').forEach(galeria => {
    const imagemPrincipal = galeria.querySelector('.imagem-destaque');
    const miniaturas = galeria.querySelectorAll('.imagens-pequenas img');

    miniaturas.forEach(mini => {
      mini.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();

        imagemPrincipal.classList.add('fade-out');

        setTimeout(() => {
          imagemPrincipal.src = mini.src;
          imagemPrincipal.alt = mini.alt;
          imagemPrincipal.classList.remove('fade-out');
        }, 200); // espera a imagem "sumir" antes de trocar
      });
    });
  });
});
